apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui 
    spec:
      containers:
      - name: ui
        image: public.ecr.aws/aws-containers/retail-store-sample-ui:latest
        envFrom:
        - configMapRef:
            name: ui
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog
        image: public.ecr.aws/aws-containers/retail-store-sample-catalog:latest
        env:
        - name: DB_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: catalog-db-config
              key: DB_ENDPOINT
        - name: DB_READ_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: catalog-db-config
              key: DB_READ_ENDPOINT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: catalog-db-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: retail-db-secrets
              key: MYSQL_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: retail-db-secrets
              key: MYSQL_PASSWORD
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: public.ecr.aws/aws-containers/retail-store-sample-orders:latest
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: orders-db-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: orders-db-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: orders-db-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: retail-db-secrets
              key: POSTGRES_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: retail-db-secrets
              key: POSTGRES_PASSWORD
        - name: RABBITMQ_HOST
          value: rabbitmq
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
      - name: cart
        image: public.ecr.aws/aws-containers/retail-store-sample-cart:latest
        env:
        - name: DYNAMODB_TABLE_NAME
          value: Items
        - name: AWS_REGION
          value: us-east-1
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
      - name: checkout
        image: public.ecr.aws/aws-containers/retail-store-sample-checkout:latest
        env:
        - name: REDIS_HOST
          value: redis
        - name: ORDERS_HOST
          value: orders
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assets
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assets
  template:
    metadata:
      labels:
        app: assets
    spec:
      containers:
      - name: assets
        image: public.ecr.aws/aws-containers/retail-store-sample-assets:latest
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
